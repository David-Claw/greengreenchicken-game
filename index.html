<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Green Green Chicken 🐔🌿</title>
    <meta property="og:title" content="Super Green Green Chicken - Mario Style Meme Game!">
    <meta property="og:description" content="GWEEN GWEEN! Jump, stomp foxes, collect green coins like Mario! Viral TikTok chicken fun!">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap');
        body { margin:0; background:#0a220a; font-family:'Comic Neue',sans-serif; overflow:hidden; touch-action:manipulation; }
        #container { position:relative; width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; background:#0a220a; }
        canvas { border:14px solid #00ff88; border-radius:24px; box-shadow:0 0 60px #00ff88; image-rendering:pixelated; background:#113311; }
        .overlay { position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; color:#fff; text-align:center; background:rgba(10,34,10,0.95); pointer-events:none; z-index:20; }
        .overlay.active { display:flex; pointer-events:auto; }
        h1 { font-size:3.4rem; margin:0 0 10px; text-shadow:6px 6px 0 #006600; line-height:1; }
        p { font-size:1.6rem; margin:10px; text-shadow:2px 2px 4px #000; }
        button { font-family:'Comic Neue',sans-serif; background:#00ff88; color:#003300; border:none; padding:18px 50px; margin:12px; font-size:1.9rem; border-radius:999px; box-shadow:0 10px #006600; cursor:pointer; width:78%; max-width:320px; }
        button:active { transform:translateY(6px); box-shadow:0 4px #006600; }
        .hud { position:absolute; top:20px; left:20px; color:#fff; font-size:1.8rem; text-shadow:3px 3px #000; z-index:10; pointer-events:none; }
        .combo { position:absolute; top:140px; left:50%; transform:translateX(-50%); font-size:3.2rem; color:#ffff00; text-shadow:5px 5px #006600; opacity:0; transition:opacity 0.4s; z-index:15; }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="c" width="400" height="620"></canvas>
        
        <!-- START -->
        <div id="start" class="overlay active">
            <h1>SUPER<br>GREEN GREEN<br>CHICKEN</h1>
            <p style="font-size:2.6rem;margin:30px 0">🐔🌿 GWEEN GWEEN!</p>
            <button onclick="startGame()">START GAME</button>
            <div style="margin-top:40px;font-size:1.5rem">👆 TAP anywhere to JUMP<br>Hold longer = HIGHER jump!</div>
            <button onclick="showShop()" style="background:#77dd77;margin-top:50px">SHOP 🪙 <span id="totalCoins">0</span></button>
            <p id="hs" style="margin-top:20px">Best Run: 0m</p>
        </div>
        
        <!-- GAME OVER -->
        <div id="over" class="overlay">
            <h1 style="color:#ff3366">GAME OVER</h1>
            <p id="final" style="font-size:2.6rem"></p>
            <p id="meme" style="font-size:2rem;margin:25px 0 40px"></p>
            <button onclick="restart()">TRY AGAIN 🐔</button>
            <button onclick="share()">SHARE GWEEN! 📱</button>
            <button onclick="watchRewarded()">2× COINS (Ad) 🤑</button>
            <button onclick="menu()" style="background:#66aa66">MENU</button>
        </div>
        
        <!-- SHOP -->
        <div id="shop" class="overlay">
            <h1>POWER-UP SHOP</h1>
            <p id="shopCoins" style="font-size:2.5rem;margin-bottom:30px">🪙 0</p>
            <button onclick="buyJump()" style="font-size:1.6rem">Higher Jump (70🪙) Lv.<span id="jumpLv">1</span></button>
            <button onclick="buyDouble()" style="font-size:1.6rem">Double Jump (120🪙) Lv.<span id="doubleLv">0</span></button>
            <button onclick="hideShop()" style="background:#cc4466;margin-top:40px">BACK TO WORLD</button>
        </div>
        
        <div class="hud" id="hud">0m ❤️❤️❤️</div>
        <div id="comboText" class="combo">GWEEN GWEEN!!!</div>
    </div>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let W = 400, H = 620;
        
        // Mario-style vars
        let player = {x: 120, y: 400, vy: 0, width: 42, height: 42, grounded: false, doubleReady: true};
        let scroll = 0;
        let scrollSpeed = 3.6;
        let score = 0;
        let highScore = +localStorage.getItem('ggcMarioHS') || 0;
        let totalCoins = +localStorage.getItem('ggcCoins') || 0;
        let upgrades = JSON.parse(localStorage.getItem('ggcMarioUpg')) || {jump:1, double:0};
        let platforms = [];
        let enemies = [];
        let coins = [];
        let particles = [];
        let frame = 0;
        let lives = 3;
        let combo = 0;
        let gameState = 'start';
        let audioCtx = null;
        let touchStartTime = 0;
        
        const deathMessages = ["Fell off the map! 😭","Fox got you sideways 🦊","GWEEN... not high enough","Hit a pipe!","Meme died mid-jump"];
        
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        function playSound(type) {
            initAudio();
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            if (type === 'jump') {
                o.type = 'sine'; o.frequency.setValueAtTime(620, audioCtx.currentTime);
                g.gain.value = 0.45; g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
                o.start(); o.stop(audioCtx.currentTime + 0.25);
            } else if (type === 'coin') {
                o.type = 'triangle'; o.frequency.setValueAtTime(1480, audioCtx.currentTime);
                setTimeout(()=>o.frequency.setValueAtTime(2100,audioCtx.currentTime+0.05),40);
                g.gain.value = 0.5; g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                o.start(); o.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'stomp') {
                o.type = 'sawtooth'; o.frequency.setValueAtTime(320, audioCtx.currentTime);
                g.gain.value = 0.6; g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
                o.start(); o.stop(audioCtx.currentTime + 0.35);
            } else if (type === 'hit') {
                o.type = 'sawtooth'; o.frequency.setValueAtTime(180, audioCtx.currentTime);
                g.gain.value = 0.8; g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
                o.start(); o.stop(audioCtx.currentTime + 0.8);
            } else if (type === 'gween') {
                o.type = 'sine'; o.frequency.setValueAtTime(880, audioCtx.currentTime);
                g.gain.value = 0.4; g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.9);
                o.start(); o.stop(audioCtx.currentTime + 0.9);
            }
        }
        
        function createParticle(x,y,color,life=40) {
            particles.push({x,y,vx:Math.random()*7-3.5,vy:Math.random()*7-8,color,life});
        }
        
        function generateChunk() {
            let lastX = platforms.length ? platforms[platforms.length-1].x + platforms[platforms.length-1].w : 0;
            for (let i = 0; i < 4; i++) {
                let px = lastX + 80 + Math.random() * 120;
                let py = 380 + Math.random() * 160;
                let pw = 110 + Math.random() * 80;
                platforms.push({x: px, y: py, w: pw});
                lastX = px + pw;
                
                // Coin above
                if (Math.random() < 0.7) coins.push({x: px + pw/2, y: py - 55, collected: false});
                
                // Enemy on platform
                if (Math.random() < 0.45) {
                    enemies.push({x: px + 20 + Math.random()*(pw-50), y: py - 38, dir:1});
                }
            }
        }
        
        function drawBG() {
            ctx.fillStyle = '#113322';
            ctx.fillRect(0,0,W,H);
            
            // Hills parallax
            ctx.fillStyle = '#006622';
            let hillScroll = (scroll * 0.3) % 300;
            ctx.beginPath();
            ctx.moveTo(-100 - hillScroll, 520);
            ctx.quadraticCurveTo(80 - hillScroll, 380, 220 - hillScroll, 510);
            ctx.quadraticCurveTo(340 - hillScroll, 340, 500 - hillScroll, 520);
            ctx.lineTo(W + 100, H); ctx.lineTo(-100, H); ctx.fill();
        }
        
        function drawChicken() {
            ctx.save();
            ctx.translate(player.x + 20, player.y + 22);
            ctx.rotate(player.vy * 0.03);
            
            ctx.fillStyle = '#00cc44';
            ctx.beginPath(); ctx.ellipse(0, 4, 21, 18, 0, 0, Math.PI*2); ctx.fill(); // body
            
            ctx.beginPath(); ctx.arc(19, -12, 13, 0, Math.PI*2); ctx.fill(); // head
            
            ctx.fillStyle = '#ffdd00';
            ctx.beginPath(); ctx.moveTo(28, -13); ctx.lineTo(40, -10); ctx.lineTo(28, -6); ctx.fill(); // beak
            
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(24, -15, 5.5, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(26, -15, 2.5, 0, Math.PI*2); ctx.fill();
            
            ctx.fillStyle = '#007722';
            ctx.beginPath(); ctx.ellipse(-8, 6, 15, 8, Math.sin(frame/4)*0.6, 0, Math.PI*2); ctx.fill(); // wing
            
            ctx.restore();
        }
        
        function drawPlatform(p) {
            ctx.fillStyle = '#aa7744';
            ctx.fillRect(p.x - scroll, p.y, p.w, 26);
            ctx.fillStyle = '#ddbb66';
            ctx.fillRect(p.x - scroll, p.y - 6, p.w, 8);
        }
        
        function drawEnemy(e) {
            ctx.fillStyle = '#cc2222';
            ctx.fillRect(e.x - scroll - 18, e.y, 36, 38);
            ctx.fillStyle = '#aa1111';
            ctx.fillRect(e.x - scroll - 22, e.y - 14, 44, 18); // head
        }
        
        function drawCoin(c) {
            ctx.save();
            ctx.translate(c.x - scroll, c.y + Math.sin(frame/5)*4);
            ctx.fillStyle = '#ffee11';
            ctx.font = 'bold 38px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('🌿', 0, 10);
            ctx.restore();
        }
        
        function update() {
            if (gameState !== 'playing') return;
            frame++;
            
            // Auto run
            scroll += scrollSpeed;
            score += 0.12;
            
            // Gravity
            player.vy += 0.72;
            player.y += player.vy;
            
            // Ground check
            player.grounded = false;
            for (let p of platforms) {
                let px = p.x - scroll;
                if (player.x + 20 > px && player.x - 20 < px + p.w &&
                    player.y + 22 > p.y - 6 && player.y + 22 < p.y + 10 && player.vy >= 0) {
                    player.y = p.y - 44;
                    player.vy = 0;
                    player.grounded = true;
                    player.doubleReady = true;
                }
            }
            
            // Fall death
            if (player.y > H + 50) endGame();
            
            // Platforms cleanup & generate
            if (platforms[0] && platforms[0].x - scroll < -200) platforms.shift();
            if (coins[0] && coins[0].x - scroll < -100) coins.shift();
            if (platforms.length < 12) generateChunk();
            
            // Enemies
            for (let i = enemies.length-1; i >= 0; i--) {
                let e = enemies[i];
                e.x += e.dir * 1.6;
                
                // Simple turn on edge (fake)
                let onPlat = false;
                for (let p of platforms) {
                    if (e.x > p.x && e.x < p.x + p.w && Math.abs(e.y - p.y + 38) < 20) onPlat = true;
                }
                if (!onPlat) e.dir *= -1;
                
                let ex = e.x - scroll;
                if (ex < -80) enemies.splice(i,1);
                
                // Collision
                if (Math.abs((player.x) - ex) < 32 && Math.abs((player.y+10) - (e.y+10)) < 32) {
                    if (player.vy > 0 && player.y + 10 < e.y) {
                        // STOMP!
                        playSound('stomp');
                        combo++;
                        score += 50 + combo * 20;
                        enemies.splice(i,1);
                        player.vy = -14; // bounce
                        for(let k=0;k<28;k++) createParticle(ex+18, e.y+10, '#ff4488');
                        
                        if (combo % 4 === 0) triggerGween();
                    } else {
                        // Side hit = death
                        endGame();
                    }
                }
            }
            
            // Coins
            for (let i = coins.length-1; i >= 0; i--) {
                let c = coins[i];
                let cx = c.x - scroll;
                if (!c.collected && Math.hypot(player.x - cx, player.y + 10 - c.y) < 38) {
                    c.collected = true;
                    totalCoins++;
                    score += 22;
                    playSound('coin');
                    for(let k=0;k<12;k++) createParticle(cx, c.y, '#ffee44', 28);
                    if (Math.random() < 0.3) triggerGween();
                }
                if (cx < -50) coins.splice(i,1);
            }
            
            // Particles
            for (let i=particles.length-1; i>=0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.3; p.life--;
                if (p.life <= 0) particles.splice(i,1);
            }
            
            // Speed ramp
            if (frame % 420 === 0) scrollSpeed = Math.min(scrollSpeed + 0.25, 7.2);
            
            // HUD update
            document.getElementById('hud').innerHTML = `${Math.floor(score)}m ❤️`.repeat(lives);
        }
        
        function triggerGween() {
            playSound('gween');
            const comboEl = document.getElementById('comboText');
            comboEl.textContent = combo > 5 ? "SUPER GWEEN GWEEN!!!" : "GWEEN GWEEN CHICKEN!!!";
            comboEl.style.opacity = 1;
            setTimeout(() => comboEl.style.opacity = 0, 1200);
            for (let i = 0; i < 70; i++) createParticle(player.x + Math.random()*60-30, player.y - 20, '#ffff44', 50);
        }
        
        function draw() {
            drawBG();
            
            platforms.forEach(p => drawPlatform(p));
            enemies.forEach(e => drawEnemy(e));
            coins.forEach(c => { if (!c.collected) drawCoin(c); });
            
            drawChicken();
            
            ctx.globalAlpha = 0.85;
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                let s = p.life / 40 * 9;
                ctx.fillRect(p.x - scroll - s/2, p.y - s/2, s, s);
            });
            ctx.globalAlpha = 1;
        }
        
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        
        function handleJump(e) {
            if (gameState !== 'playing') return;
            e.preventDefault();
            touchStartTime = Date.now();
            
            const canJump = player.grounded || (upgrades.double > 0 && player.doubleReady);
            
            if (canJump) {
                let jumpPower = -15.5 - upgrades.jump * 1.2;
                player.vy = jumpPower;
                player.grounded = false;
                if (!player.grounded) player.doubleReady = false;
                playSound('jump');
                for(let i=0;i<11;i++) createParticle(player.x + 10, player.y + 38, '#aaffcc');
            }
        }
        
        function handleRelease() {
            // Optional short jump boost - not needed for this simple version
        }
        
        function startGame() {
            document.getElementById('start').classList.remove('active');
            reset();
            gameState = 'playing';
        }
        
        function reset() {
            scroll = 0;
            scrollSpeed = 3.6;
            score = 0;
            lives = 3;
            combo = 0;
            player.y = 320;
            player.vy = 0;
            player.doubleReady = true;
            platforms = [];
            enemies = [];
            coins = [];
            particles = [];
            frame = 0;
            generateChunk(); generateChunk(); generateChunk();
        }
        
        function endGame() {
            gameState = 'over';
            playSound('hit');
            document.getElementById('over').classList.add('active');
            let final = Math.floor(score);
            document.getElementById('final').innerHTML = `FINAL RUN<br>${final}m`;
            document.getElementById('meme').textContent = deathMessages[Math.floor(Math.random()*deathMessages.length)];
            
            totalCoins += Math.floor(final / 2.5) + combo * 3;
            localStorage.setItem('ggcCoins', totalCoins);
            
            if (final > highScore) {
                highScore = final;
                localStorage.setItem('ggcMarioHS', highScore);
            }
        }
        
        function restart() {
            document.getElementById('over').classList.remove('active');
            reset();
            gameState = 'playing';
        }
        
        function menu() {
            document.getElementById('over').classList.remove('active');
            document.getElementById('start').classList.add('active');
            updateUI();
        }
        
        function share() {
            const text = `I ran ${Math.floor(score)}m in Super Green Green Chicken! Stomped ${combo} foxes & screamed GWEEN GWEEN! 🐔🌿 Beat me → greengreenchicken.com`;
            if (navigator.share) navigator.share({title:'Super Green Green Chicken', text, url:'https://greengreenchicken.com'});
            else { navigator.clipboard.writeText(text); alert('✅ Copied for TikTok/IG!'); }
        }
        
        function watchRewarded() {
            alert("📺 Rewarded ad demo\n+180 bonus coins!");
            totalCoins += 180;
            localStorage.setItem('ggcCoins', totalCoins);
            updateUI();
        }
        
        function updateUI() {
            document.getElementById('hs').textContent = `Best Run: ${highScore}m`;
            document.getElementById('totalCoins').textContent = totalCoins;
            document.getElementById('shopCoins').textContent = `🪙 ${totalCoins}`;
            document.getElementById('jumpLv').textContent = upgrades.jump;
            document.getElementById('doubleLv').textContent = upgrades.double;
        }
        
        function showShop() {
            document.getElementById('start').classList.remove('active');
            document.getElementById('shop').classList.add('active');
            updateUI();
        }
        
        function hideShop() {
            document.getElementById('shop').classList.remove('active');
            document.getElementById('start').classList.add('active');
            updateUI();
        }
        
        function buyJump() {
            let cost = 65 + upgrades.jump * 40;
            if (totalCoins >= cost) {
                totalCoins -= cost;
                upgrades.jump++;
                localStorage.setItem('ggcMarioUpg', JSON.stringify(upgrades));
                localStorage.setItem('ggcCoins', totalCoins);
                updateUI();
            } else alert("Need more green coins! 🪙");
        }
        
        function buyDouble() {
            let cost = 115 + upgrades.double * 70;
            if (totalCoins >= cost) {
                totalCoins -= cost;
                upgrades.double++;
                localStorage.setItem('ggcMarioUpg', JSON.stringify(upgrades));
                localStorage.setItem('ggcCoins', totalCoins);
                updateUI();
            } else alert("Keep stomping for coins! 🐔");
        }
        
        // INPUT
        canvas.addEventListener('touchstart', (e) => { handleJump(e); });
        canvas.addEventListener('mousedown', (e) => { handleJump(e); });
        canvas.addEventListener('touchend', handleRelease);
        
        document.addEventListener('keydown', e => {
            if (gameState === 'playing' && (e.key === ' ' || e.key === 'ArrowUp')) {
                e.preventDefault();
                if (player.grounded || (upgrades.double > 0 && player.doubleReady)) {
                    player.vy = -15.5 - upgrades.jump * 1.2;
                    player.grounded = false;
                    if (!player.grounded) player.doubleReady = false;
                    playSound('jump');
                }
            }
        });
        
        // Init
        updateUI();
        loop();
        
        function resize() {
            let ratio = W/H;
            let cw = Math.min(window.innerWidth*0.96, 440);
            canvas.style.width = cw+'px';
            canvas.style.height = (cw/ratio)+'px';
        }
        window.addEventListener('resize', resize);
        resize();
    </script>
</body>
</html>
