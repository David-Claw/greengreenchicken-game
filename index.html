<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Green Green Chicken 🐔🌿 GWEEN GWEEN!</title>
    <meta property="og:title" content="Green Green Chicken - GWEEN GWEEN!">
    <meta property="og:description" content="The viral TikTok meme game! Tap sides to switch lanes, collect GREEN, scream GWEEN GWEEN CHICKEN!">
    <meta property="og:image" content="https://picsum.photos/id/237/1200/630">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap');
        body { margin:0; background:#0a220a; font-family:'Comic Neue', system-ui; overflow:hidden; touch-action:manipulation; }
        #container { position:relative; width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; background:#0a220a; }
        canvas { border:14px solid #00ff88; border-radius:24px; box-shadow:0 0 50px #00ff88; image-rendering:pixelated; background:#112211; }
        .overlay { position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; color:#fff; text-align:center; background:rgba(10,34,10,0.94); pointer-events:none; z-index:10; }
        .overlay.active { display:flex; pointer-events:auto; }
        h1 { font-size:3.8rem; margin:0 0 8px; text-shadow:6px 6px 0 #006600; line-height:1.05; }
        p { font-size:1.7rem; margin:8px; text-shadow:2px 2px 4px #000; }
        button { font-family:'Comic Neue',sans-serif; background:#00ff88; color:#003300; border:none; padding:20px 50px; margin:14px; font-size:2rem; border-radius:999px; box-shadow:0 12px #006600; cursor:pointer; width:80%; max-width:340px; }
        button:active { transform:translateY(6px); box-shadow:0 4px #006600; }
        .combo { position:absolute; top:120px; left:50%; transform:translateX(-50%); font-size:3rem; color:#ffff00; text-shadow:4px 4px #006600; pointer-events:none; opacity:0; transition:opacity .3s; }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="c" width="400" height="620"></canvas>
        
        <!-- START -->
        <div id="start" class="overlay active">
            <h1 onclick="easterTap()">GREEN GREEN<br>CHICKEN</h1>
            <p style="font-size:2.8rem;margin:20px 0">GWEEN GWEEN! 🐔🌿</p>
            <button onclick="startGame()">TAP TO START!</button>
            <div style="font-size:1.5rem;margin-top:30px">👈 TAP LEFT / RIGHT 👉<br>to switch lanes</div>
            <button onclick="showShop()" style="background:#77dd77;font-size:1.7rem;margin-top:40px">SHOP 🪙 <span id="totalCoins">0</span></button>
            <p id="hs" style="margin-top:20px;font-size:1.5rem">Best: 0</p>
        </div>
        
        <!-- GAME OVER -->
        <div id="over" class="overlay">
            <h1 style="color:#ff3366">GAME OVER</h1>
            <p id="final" style="font-size:2.8rem"></p>
            <p id="meme" style="font-size:2.1rem;margin:30px 0"></p>
            <button onclick="restart()">PLAY AGAIN 🐔</button>
            <button onclick="share()">SHARE GWEEN GWEEN 📱</button>
            <button onclick="watchRewarded()">2× COINS (Ad) 🤑</button>
            <button onclick="menu()" style="background:#66aa66">MENU</button>
        </div>
        
        <!-- SHOP -->
        <div id="shop" class="overlay">
            <h1>CHICKEN SHOP 🛒</h1>
            <p id="shopCoins" style="font-size:2.6rem">🪙 0</p>
            <button onclick="buySpeed()" style="font-size:1.6rem">Faster Run (60🪙) Lv.<span id="speedLv">1</span></button>
            <button onclick="buyMagnet()" style="font-size:1.6rem">Coin Magnet (90🪙) Lv.<span id="magLv">0</span></button>
            <button onclick="hideShop()" style="background:#cc4466;margin-top:50px">CLOSE</button>
        </div>
        
        <div id="comboText" class="combo">GWEEN GWEEN CHICKEN!!!</div>
    </div>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let W = 400, H = 620;
        
        // Game vars
        let playerLane = 1;
        let targetLane = 1;
        let playerX = 200;
        let scrollSpeed = 2.8;
        let score = 0;
        let highScore = +localStorage.getItem('ggcHS') || 0;
        let totalCoins = +localStorage.getItem('ggcCoins') || 0;
        let upgrades = JSON.parse(localStorage.getItem('ggcUpg')) || {speed:1, magnet:0};
        let obstacles = [];
        let collectibles = [];
        let particles = [];
        let frame = 0;
        let combo = 0;
        let lives = 3;
        let gameState = 'start';
        let lastSpawn = 0;
        let hypeTime = 0;
        let audioCtx = null;
        let deathMessages = ["GWEEN... too slow! 😭","Fox stole the ball! 🦊","Missed the green!","Chicken got cooked 🔥","GWEEN GWEEN... oops"];
        
        const laneX = [90, 200, 310];
        
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        function playSound(type) {
            initAudio();
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            if (type === 'jump') {
                o.type = 'sine'; o.frequency.setValueAtTime(680, audioCtx.currentTime);
                g.gain.value = 0.5; g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
                o.start(); o.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'coin') {
                o.type = 'sine'; o.frequency.setValueAtTime(1100, audioCtx.currentTime);
                setTimeout(() => o.frequency.setValueAtTime(1650, audioCtx.currentTime + 0.06), 40);
                g.gain.value = 0.5; g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                o.start(); o.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'hype') {
                o.type = 'sawtooth'; o.frequency.setValueAtTime(440, audioCtx.currentTime);
                g.gain.value = 0.4; g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.2);
                o.start(); o.stop(audioCtx.currentTime + 1.2);
            } else if (type === 'hit') {
                o.type = 'sawtooth'; o.frequency.setValueAtTime(280, audioCtx.currentTime);
                g.gain.value = 0.8; g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.7);
                o.start(); o.stop(audioCtx.currentTime + 0.7);
            }
        }
        
        function createParticle(x, y, color, life = 30) {
            particles.push({x, y, vx: Math.random() * 6 - 3, vy: Math.random() * 6 - 5, color, life, size: Math.random() * 8 + 5});
        }
        
        function drawBG() {
            ctx.fillStyle = '#112211';
            ctx.fillRect(0, 0, W, H);
            // Green court
            ctx.fillStyle = '#00aa44';
            ctx.fillRect(0, 380, W, 240);
            // Lines
            ctx.strokeStyle = '#ffff00';
            ctx.lineWidth = 8;
            ctx.beginPath();
            ctx.moveTo(0, 420); ctx.lineTo(W, 420);
            ctx.moveTo(0, 520); ctx.lineTo(W, 520);
            ctx.stroke();
            // Scrolling background trees/hills
            ctx.fillStyle = '#006622';
            for (let i = -1; i < 6; i++) {
                let gx = ((frame * 1.2) % 140) + i * 140;
                ctx.fillRect(gx, 320, 60, 80);
            }
        }
        
        function drawChicken() {
            ctx.save();
            ctx.translate(playerX, 440);
            ctx.scale(1.1, 1.1);
            
            // Body
            ctx.fillStyle = '#00cc44';
            ctx.beginPath(); ctx.ellipse(0, 0, 26, 22, 0, 0, Math.PI * 2); ctx.fill();
            
            // Head
            ctx.beginPath(); ctx.arc(22, -18, 14, 0, Math.PI * 2); ctx.fill();
            
            // Beak
            ctx.fillStyle = '#ffdd22';
            ctx.beginPath(); ctx.moveTo(32, -18); ctx.lineTo(44, -16); ctx.lineTo(32, -12); ctx.fill();
            
            // Eye
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(27, -20, 6, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(29, -20, 3, 0, Math.PI * 2); ctx.fill();
            
            // Wings
            ctx.fillStyle = '#007722';
            ctx.beginPath(); ctx.ellipse(-12, 4, 18, 11, Math.sin(frame / 5) * 0.4, 0, Math.PI * 2); ctx.fill();
            
            ctx.restore();
        }
        
        function drawObstacle(o) {
            ctx.fillStyle = '#cc2222';
            ctx.fillRect(o.x - 22, 410, 44, 80); // fox / obstacle
            ctx.fillStyle = '#aa1111';
            ctx.fillRect(o.x - 28, 390, 56, 30); // head
        }
        
        function drawCollectible(c) {
            ctx.save();
            ctx.translate(c.x, c.y + Math.sin(frame / 4) * 6);
            ctx.fillStyle = '#ffee11';
            ctx.font = 'bold 42px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('🌿', 0, 0);
            ctx.restore();
        }
        
        function update() {
            if (gameState !== 'playing') return;
            frame++;
            
            // Lane lerp
            playerX += (laneX[targetLane] - playerX) * 0.28;
            
            // Scroll
            scrollSpeed = 2.8 + upgrades.speed * 0.6 + Math.min(frame / 800, 4.5);
            
            // Spawn
            if (frame - lastSpawn > 38 - Math.min(frame / 90, 22)) {
                lastSpawn = frame;
                const rnd = Math.random();
                const l = Math.floor(Math.random() * 3);
                if (rnd < 0.65) {
                    obstacles.push({lane: l, x: W + 40});
                } else {
                    collectibles.push({lane: l, x: W + 40, y: 380 + Math.random() * 80});
                }
            }
            
            // Update obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let o = obstacles[i];
                o.x -= scrollSpeed;
                if (o.x < -60) { obstacles.splice(i, 1); continue; }
                
                if (o.lane === targetLane && Math.abs(o.x - playerX) < 42) {
                    hitObstacle(i);
                }
            }
            
            // Collectibles
            for (let i = collectibles.length - 1; i >= 0; i--) {
                let c = collectibles[i];
                c.x -= scrollSpeed + 0.4;
                
                let dx = c.x - playerX;
                let dy = c.y - 440;
                if (c.lane === targetLane && Math.hypot(dx, dy) < 48 + upgrades.magnet * 14) {
                    totalCoins++;
                    score += 12 + combo * 3;
                    combo++;
                    playSound('coin');
                    for (let k = 0; k < 18; k++) createParticle(c.x, c.y, '#ffee66', 32);
                    
                    if (combo % 8 === 0) triggerHype();
                    
                    collectibles.splice(i, 1);
                }
                
                if (c.x < -40) collectibles.splice(i, 1);
            }
            
            // Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.22; p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }
            
            score += 0.18;
            
            if (hypeTime > 0) hypeTime--;
        }
        
        function triggerHype() {
            hypeTime = 110;
            playSound('hype');
            document.getElementById('comboText').style.opacity = 1;
            setTimeout(() => document.getElementById('comboText').style.opacity = 0, 1400);
            for (let i = 0; i < 80; i++) {
                createParticle(playerX + Math.random() * 80 - 40, 360 + Math.random() * 100, '#ffff00', 55);
            }
            score += 80;
        }
        
        function hitObstacle(i) {
            playSound('hit');
            lives--;
            for (let k = 0; k < 45; k++) createParticle(obstacles[i].x, 440, '#ff4444', 40);
            obstacles.splice(i, 1);
            
            if (lives <= 0) {
                endGame();
            } else {
                // short invincibility
                setTimeout(() => {}, 800);
            }
        }
        
        function draw() {
            drawBG();
            
            obstacles.forEach(o => drawObstacle(o));
            collectibles.forEach(c => drawCollectible(c));
            drawChicken();
            
            // Particles
            for (let p of particles) {
                ctx.globalAlpha = p.life / 35;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
            }
            ctx.globalAlpha = 1;
            
            // HUD
            ctx.fillStyle = '#fff';
            ctx.font = '900 52px Comic Neue';
            ctx.textAlign = 'left';
            ctx.fillText(Math.floor(score), 24, 68);
            
            // Lives
            ctx.font = 'bold 32px sans-serif';
            ctx.fillText('❤️'.repeat(lives), 24, 120);
            
            // Combo indicator
            if (combo > 3) {
                ctx.fillStyle = '#ffff00';
                ctx.font = 'bold 26px Comic Neue';
                ctx.fillText(combo + '× GWEEN!', 220, 68);
            }
        }
        
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        
        function startGame() {
            document.getElementById('start').classList.remove('active');
            reset();
            gameState = 'playing';
        }
        
        function reset() {
            playerLane = 1; targetLane = 1; playerX = 200;
            obstacles = []; collectibles = []; particles = [];
            score = 0; combo = 0; lives = 3; scrollSpeed = 2.8;
            frame = 0; lastSpawn = -40; hypeTime = 0;
        }
        
        function endGame() {
            gameState = 'over';
            document.getElementById('over').classList.add('active');
            let final = Math.floor(score);
            document.getElementById('final').innerHTML = `GWEEN SCORE<br>${final}`;
            document.getElementById('meme').textContent = deathMessages[Math.floor(Math.random() * deathMessages.length)];
            
            totalCoins += Math.floor(final / 3) + combo * 2;
            localStorage.setItem('ggcCoins', totalCoins);
            
            if (final > highScore) {
                highScore = final;
                localStorage.setItem('ggcHS', highScore);
            }
        }
        
        function restart() {
            document.getElementById('over').classList.remove('active');
            reset();
            gameState = 'playing';
        }
        
        function menu() {
            document.getElementById('over').classList.remove('active');
            document.getElementById('start').classList.add('active');
            updateUI();
        }
        
        function share() {
            const text = `I just hit ${Math.floor(score)} in Green Green Chicken and screamed GWEEN GWEEN ${combo} times! 🐔🌿 Beat me at greengreenchicken.com`;
            if (navigator.share) navigator.share({title: 'Green Green Chicken', text: text, url: 'https://greengreenchicken.com'});
            else { navigator.clipboard.writeText(text); alert('✅ Copied! Paste on TikTok / IG / WhatsApp'); }
        }
        
        function watchRewarded() {
            alert("📺 Rewarded ad demo\n+150 bonus coins added!");
            totalCoins += 150;
            localStorage.setItem('ggcCoins', totalCoins);
            updateUI();
        }
        
        function updateUI() {
            document.getElementById('hs').textContent = `Best: ${highScore}`;
            document.getElementById('totalCoins').textContent = totalCoins;
            document.getElementById('shopCoins').textContent = `🪙 ${totalCoins}`;
            document.getElementById('speedLv').textContent = upgrades.speed;
            document.getElementById('magLv').textContent = upgrades.magnet;
        }
        
        function showShop() {
            document.getElementById('start').classList.remove('active');
            document.getElementById('shop').classList.add('active');
            updateUI();
        }
        
        function hideShop() {
            document.getElementById('shop').classList.remove('active');
            document.getElementById('start').classList.add('active');
            updateUI();
        }
        
        function buySpeed() {
            let cost = 55 + upgrades.speed * 35;
            if (totalCoins >= cost) {
                totalCoins -= cost;
                upgrades.speed++;
                localStorage.setItem('ggcUpg', JSON.stringify(upgrades));
                localStorage.setItem('ggcCoins', totalCoins);
                updateUI();
            } else alert("Not enough coins! Keep collecting GWEEN! 🐔");
        }
        
        function buyMagnet() {
            let cost = 85 + upgrades.magnet * 60;
            if (totalCoins >= cost) {
                totalCoins -= cost;
                upgrades.magnet++;
                localStorage.setItem('ggcUpg', JSON.stringify(upgrades));
                localStorage.setItem('ggcCoins', totalCoins);
                updateUI();
            } else alert("Not enough coins 🪙");
        }
        
        function easterTap() {
            if (Math.random() < 0.2) alert("🌈 GWEEN GWEEN DISCO MODE! (just kidding... for now 😎)");
        }
        
        // INPUT - SUPER SIMPLE FOR KIDS
        function handleTap(e) {
            if (gameState !== 'playing') return;
            e.preventDefault();
            const tapX = e.touches ? e.touches[0].clientX : e.clientX;
            const relX = tapX - canvas.getBoundingClientRect().left;
            if (relX < W * 0.5) {
                targetLane = Math.max(0, targetLane - 1);
            } else {
                targetLane = Math.min(2, targetLane + 1);
            }
        }
        
        canvas.addEventListener('touchstart', handleTap);
        canvas.addEventListener('mousedown', handleTap);
        
        // Keyboard for desktop
        document.addEventListener('keydown', e => {
            if (gameState !== 'playing') return;
            if (e.key === 'ArrowLeft' || e.key === 'a') targetLane = Math.max(0, targetLane - 1);
            if (e.key === 'ArrowRight' || e.key === 'd') targetLane = Math.min(2, targetLane + 1);
        });
        
        // Init
        updateUI();
        loop();
        
        function resize() {
            let ratio = W / H;
            let cw = Math.min(window.innerWidth * 0.96, 440);
            canvas.style.width = cw + 'px';
            canvas.style.height = (cw / ratio) + 'px';
        }
        window.addEventListener('resize', resize);
        resize();
    </script>
</body>
</html>
