<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Green Green Chicken 🐔🌿</title>
    <meta property="og:title" content="Super Green Green Chicken - Premium Mario Meme Game!">
    <meta property="og:description" content="GWEEN GWEEN! Walk left & right, jump over foxes, collect green coins — the coolest endless Mario-style chicken game ever!">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap');
        body { margin:0; background:#0a220a; font-family:'Comic Neue',sans-serif; overflow:hidden; touch-action:manipulation; }
        #container { position:relative; width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; background:#0a220a; }
        canvas { border:18px solid #00ff88; border-radius:32px; box-shadow:0 0 80px #00ff88, 0 0 40px #00cc66; image-rendering:pixelated; background:#113311; }
        .overlay { position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; color:#fff; text-align:center; background:rgba(10,34,10,0.96); pointer-events:none; z-index:30; }
        .overlay.active { display:flex; pointer-events:auto; }
        h1 { font-size:3.8rem; margin:0 0 12px; text-shadow:8px 8px 0 #006600; line-height:0.92; }
        p { font-size:1.7rem; margin:12px; text-shadow:3px 3px 6px #000; }
        button { font-family:'Comic Neue',sans-serif; background:#00ff88; color:#003300; border:none; padding:22px 60px; margin:16px; font-size:2.1rem; border-radius:999px; box-shadow:0 14px #006600; cursor:pointer; width:78%; max-width:340px; }
        button:active { transform:translateY(8px); box-shadow:0 6px #006600; }
        .hud { position:absolute; top:20px; left:20px; color:#fff; font-size:2.2rem; text-shadow:4px 4px #000; z-index:20; pointer-events:none; }
        .combo { position:absolute; top:100px; left:50%; transform:translateX(-50%); font-size:4rem; color:#ffff00; text-shadow:8px 8px #006600; opacity:0; transition:all 0.3s; z-index:25; pointer-events:none; }
        .flash { position:absolute; inset:0; background:#ffff44; opacity:0; pointer-events:none; z-index:15; transition:opacity 0.2s; }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="c" width="400" height="620"></canvas>
        
        <!-- START -->
        <div id="start" class="overlay active">
            <h1>SUPER<br>GREEN GREEN<br>CHICKEN</h1>
            <p style="font-size:2.9rem;margin:30px 0">🐔🌿 GWEEN GWEEN!</p>
            <button onclick="startGame()">START ADVENTURE!</button>
            <div style="margin-top:50px;font-size:1.6rem">← → WALK<br>👆 TAP to JUMP (hold higher!)</div>
            <button onclick="showShop()" style="background:#77dd77;margin-top:50px">SHOP 🪙 <span id="totalCoins">0</span></button>
            <p id="hs" style="margin-top:20px">Best Run: 0m</p>
        </div>
        
        <!-- GAME OVER -->
        <div id="over" class="overlay">
            <h1 style="color:#ff3366">GAME OVER</h1>
            <p id="final" style="font-size:2.9rem"></p>
            <p id="meme" style="font-size:2.2rem;margin:30px 0 40px"></p>
            <button onclick="restart()">TRY AGAIN 🐔</button>
            <button onclick="share()">SHARE GWEEN! 📱</button>
            <button onclick="watchRewarded()">2× COINS (Ad) 🤑</button>
            <button onclick="menu()" style="background:#66aa66">MENU</button>
        </div>
        
        <!-- SHOP -->
        <div id="shop" class="overlay">
            <h1>POWER-UP SHOP</h1>
            <p id="shopCoins" style="font-size:2.7rem;margin-bottom:30px">🪙 0</p>
            <button onclick="buyRun()" style="font-size:1.7rem">Faster Run (90🪙) Lv.<span id="runLv">1</span></button>
            <button onclick="buyJump()" style="font-size:1.7rem">Higher Jump (110🪙) Lv.<span id="jumpLv">1</span></button>
            <button onclick="buyDouble()" style="font-size:1.7rem">Double Jump (160🪙) Lv.<span id="doubleLv">0</span></button>
            <button onclick="hideShop()" style="background:#cc4466;margin-top:40px">BACK TO WORLD</button>
        </div>
        
        <div class="hud" id="hud">0m ❤️❤️❤️</div>
        <div id="comboText" class="combo">GWEEN GWEEN!!!</div>
        <div id="flash" class="flash"></div>
    </div>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let W = 400, H = 620;
        
        let player = {x: 180, y: 420, vx: 0, vy: 0, width: 46, height: 46, grounded: false, doubleReady: true, facing: 1};
        let cameraX = 0;
        let score = 0;
        let highScore = +localStorage.getItem('ggcPremiumHS') || 0;
        let totalCoins = +localStorage.getItem('ggcCoins') || 0;
        let upgrades = JSON.parse(localStorage.getItem('ggcPremiumUpg')) || {run:1, jump:1, double:0};
        let enemies = [];
        let collectibles = [];
        let particles = [];
        let frame = 0;
        let lives = 3;
        let combo = 0;
        let gameState = 'start';
        let audioCtx = null;
        let leftPressed = false, rightPressed = false, jumpPressed = false;
        let holdStart = 0;
        
        const floorY = 460;
        const deathMessages = ["Fox got you sideways 🦊","GWEEN... too slow","Hit a pipe!","Meme died mid-run","Not green enough!"];
        
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        function playSound(type) {
            initAudio();
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            if (type === 'jump') {
                o.type = 'sine'; o.frequency.setValueAtTime(720, audioCtx.currentTime);
                g.gain.value = 0.5; g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
                o.start(); o.stop(audioCtx.currentTime + 0.25);
            } else if (type === 'coin') {
                o.type = 'triangle'; o.frequency.setValueAtTime(1520, audioCtx.currentTime);
                setTimeout(()=>o.frequency.setValueAtTime(2180,audioCtx.currentTime+0.06),40);
                g.gain.value = 0.55; g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.32);
                o.start(); o.stop(audioCtx.currentTime + 0.32);
            } else if (type === 'stomp') {
                o.type = 'sawtooth'; o.frequency.setValueAtTime(360, audioCtx.currentTime);
                g.gain.value = 0.7; g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
                o.start(); o.stop(audioCtx.currentTime + 0.4);
            } else if (type === 'hit') {
                o.type = 'sawtooth'; o.frequency.setValueAtTime(140, audioCtx.currentTime);
                g.gain.value = 0.9; g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.8);
                o.start(); o.stop(audioCtx.currentTime + 0.8);
            } else if (type === 'gween') {
                o.type = 'sine'; o.frequency.setValueAtTime(960, audioCtx.currentTime);
                g.gain.value = 0.48; g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.2);
                o.start(); o.stop(audioCtx.currentTime + 1.2);
            }
        }
        
        function createParticle(x,y,color,life=45) {
            particles.push({x,y,vx:Math.random()*9-4.5,vy:Math.random()*9-8,color,life});
        }
        
        function generateAhead() {
            let lastX = enemies.length ? Math.max(...enemies.map(e=>e.x)) : cameraX + W + 200;
            if (Math.random() < 0.6) {
                enemies.push({x: lastX + 180 + Math.random()*220, y: floorY - 42, dir: -1});
            }
            if (Math.random() < 0.75) {
                collectibles.push({x: lastX + 140 + Math.random()*160, y: floorY - 68, collected: false});
            }
            // Rare small platform
            if (Math.random() < 0.35) {
                collectibles.push({x: lastX + 300, y: floorY - 140, collected: false});
            }
        }
        
        function drawBG() {
            // Sky
            const grad = ctx.createLinearGradient(0,0,0,H);
            grad.addColorStop(0, '#88ffcc');
            grad.addColorStop(1, '#226633');
            ctx.fillStyle = grad;
            ctx.fillRect(0,0,W,H);
            
            // Parallax hills
            let hx = (cameraX * 0.25) % 380;
            ctx.fillStyle = '#007733';
            ctx.beginPath();
            ctx.moveTo(-100 - hx, H);
            ctx.quadraticCurveTo(80 - hx, 320, 260 - hx, H-80);
            ctx.quadraticCurveTo(420 - hx, 280, 620 - hx, H);
            ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.fill();
            
            // Trees
            let tx = (cameraX * 0.55) % 260;
            ctx.fillStyle = '#004422';
            for (let i = -1; i < 4; i++) {
                let treeX = (i*260 - tx) % (W+300);
                ctx.fillRect(treeX + 30, 380, 24, 120);
                ctx.fillStyle = '#00aa44';
                ctx.beginPath(); ctx.arc(treeX+42, 360, 42, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(treeX+22, 340, 32, 0, Math.PI*2); ctx.fill();
            }
            
            // Ground
            ctx.fillStyle = '#aa7744';
            ctx.fillRect(0, floorY + 10, W, H - floorY);
            ctx.fillStyle = '#00cc44';
            ctx.fillRect(0, floorY - 8, W, 26);
        }
        
        function drawChicken() {
            let runBob = player.grounded ? Math.sin(frame / 2.5) * 2.5 : 0;
            let legSwing = player.grounded ? Math.sin(frame / 2) * 1.2 : 0;
            
            ctx.save();
            ctx.translate(player.x - cameraX + 24, player.y + 24 + runBob);
            ctx.scale(player.facing, 1);
            ctx.rotate(player.vy * 0.015);
            
            // Tail
            ctx.fillStyle = '#007722';
            ctx.beginPath(); ctx.ellipse(-26, 6, 18, 9, 0.6, 0, Math.PI*2); ctx.fill();
            
            // Body
            ctx.fillStyle = '#00cc44';
            ctx.beginPath(); ctx.ellipse(0, 4, 24, 20, 0, 0, Math.PI*2); ctx.fill();
            
            // Head
            ctx.beginPath(); ctx.arc(22, -16, 15, 0, Math.PI*2); ctx.fill();
            
            // Beak
            ctx.fillStyle = '#ffdd22';
            ctx.beginPath(); ctx.moveTo(34, -16); ctx.lineTo(48, -13); ctx.lineTo(34, -9); ctx.fill();
            
            // Eye
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(26, -18, 7, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(28.5, -18, 3.5, 0, Math.PI*2); ctx.fill();
            
            // Wing
            ctx.fillStyle = '#007722';
            ctx.beginPath(); ctx.ellipse(-12, 8, 20, 11, player.grounded ? Math.sin(frame/4)*0.9 : -0.5, 0, Math.PI*2); ctx.fill();
            
            // Legs
            ctx.strokeStyle = '#ddbb00'; ctx.lineWidth = 6.5;
            ctx.beginPath();
            ctx.moveTo(-12, 22); ctx.lineTo(-16, 36 + legSwing);
            ctx.moveTo(8, 22); ctx.lineTo(12, 36 - legSwing);
            ctx.stroke();
            
            ctx.restore();
        }
        
        function drawEnemy(e) {
            let ex = e.x - cameraX;
            let bob = Math.sin(frame / 5) * 2.5;
            ctx.fillStyle = '#cc2222';
            ctx.fillRect(ex - 20, e.y + bob, 40, 42);
            ctx.fillStyle = '#aa1111';
            ctx.fillRect(ex - 26, e.y - 12 + bob, 52, 22);
            // Eyes
            ctx.fillStyle = '#fff';
            ctx.fillRect(ex - 14, e.y - 2 + bob, 8, 8);
            ctx.fillRect(ex + 6, e.y - 2 + bob, 8, 8);
        }
        
        function drawCollectible(c) {
            let cx = c.x - cameraX;
            ctx.save();
            ctx.translate(cx, c.y + Math.sin(frame/3.5)*6);
            ctx.fillStyle = '#ffee11';
            ctx.font = 'bold 46px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('🌿', 0, 14);
            ctx.restore();
        }
        
        function update() {
            if (gameState !== 'playing') return;
            frame++;
            
            // Movement
            let acc = 1.35 + upgrades.run * 0.25;
            if (leftPressed) { player.vx -= acc; player.facing = -1; }
            if (rightPressed) { player.vx += acc; player.facing = 1; }
            player.vx *= 0.84;
            player.x += player.vx;
            
            // Gravity & jump
            if (jumpPressed && (player.grounded || (upgrades.double > 0 && player.doubleReady))) {
                player.vy = -17.5 - upgrades.jump * 1.6;
                player.grounded = false;
                if (!player.grounded && upgrades.double > 0) player.doubleReady = false;
                playSound('jump');
                for(let i=0;i<16;i++) createParticle(player.x + 20, player.y + 44, '#aaffcc');
                jumpPressed = false;
            }
            player.vy += 0.82;
            player.y += player.vy;
            
            // Ground
            player.grounded = false;
            if (player.y > floorY - player.height) {
                player.y = floorY - player.height;
                player.vy = 0;
                player.grounded = true;
                player.doubleReady = true;
            }
            
            // Camera follow
            let targetCam = player.x - W * 0.45;
            cameraX += (targetCam - cameraX) * 0.12;
            if (cameraX < 0) cameraX = 0;
            
            // Generate
            if (frame % 28 === 0) generateAhead();
            
            // Enemies
            for (let i = enemies.length-1; i>=0; i--) {
                let e = enemies[i];
                e.x += e.dir * 1.9;
                let ex = e.x - cameraX;
                if (ex < -100 || ex > W + 200) enemies.splice(i,1);
                
                if (Math.abs(player.x - e.x) < 38 && Math.abs(player.y - e.y) < 44) {
                    if (player.vy > 0 && player.y + 10 < e.y) {
                        playSound('stomp');
                        combo++;
                        score += 70 + combo * 30;
                        enemies.splice(i,1);
                        player.vy = -18;
                        for(let k=0;k<38;k++) createParticle(e.x + 20, e.y + 20, '#ff4488');
                        if (combo % 4 === 0) triggerGween();
                    } else {
                        endGame();
                    }
                }
            }
            
            // Collectibles
            for (let i=collectibles.length-1; i>=0; i--) {
                let c = collectibles[i];
                if (!c.collected && Math.hypot(player.x - c.x, player.y + 12 - c.y) < 42) {
                    c.collected = true;
                    totalCoins++;
                    score += 28;
                    playSound('coin');
                    for(let k=0;k<18;k++) createParticle(c.x, c.y+10, '#ffee44', 34);
                    if (Math.random() < 0.4) triggerGween();
                }
                if (c.x - cameraX < -80) collectibles.splice(i,1);
            }
            
            // Particles
            for (let i=particles.length-1; i>=0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.3; p.life--;
                if (p.life <= 0) particles.splice(i,1);
            }
            
            score += Math.abs(player.vx) * 0.035;
            document.getElementById('hud').innerHTML = `${Math.floor(score)}m ❤️`.repeat(lives);
        }
        
        function triggerGween() {
            playSound('gween');
            const el = document.getElementById('comboText');
            el.style.transform = 'translateX(-50%) scale(1.3)';
            el.style.opacity = 1;
            setTimeout(() => { el.style.opacity = 0; el.style.transform = 'translateX(-50%) scale(1)'; }, 1400);
            const flash = document.getElementById('flash');
            flash.style.opacity = 0.42;
            setTimeout(() => flash.style.opacity = 0, 220);
            for (let i = 0; i < 95; i++) createParticle(player.x + Math.random()*80-40, player.y - 30, '#ffff66', 62);
            score += 110;
        }
        
        function draw() {
            drawBG();
            enemies.forEach(e => drawEnemy(e));
            collectibles.forEach(c => { if (!c.collected) drawCollectible(c); });
            drawChicken();
            
            ctx.globalAlpha = 0.9;
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                let s = p.life / 45 * 9;
                ctx.fillRect(p.x - cameraX - s/2, p.y - s/2, s, s);
            });
            ctx.globalAlpha = 1;
        }
        
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        
        function startGame() {
            document.getElementById('start').classList.remove('active');
            reset();
            gameState = 'playing';
        }
        
        function reset() {
            cameraX = 0;
            player.x = 180; player.y = floorY - player.height; player.vx = 0; player.vy = 0;
            enemies = []; collectibles = []; particles = [];
            score = 0; lives = 3; combo = 0; frame = 0;
            for (let i = 0; i < 8; i++) generateAhead();
        }
        
        function endGame() {
            gameState = 'over';
            playSound('hit');
            document.getElementById('over').classList.add('active');
            let final = Math.floor(score);
            document.getElementById('final').innerHTML = `FINAL RUN<br>${final}m`;
            document.getElementById('meme').textContent = deathMessages[Math.floor(Math.random()*deathMessages.length)];
            totalCoins += Math.floor(final / 2.2) + combo * 5;
            localStorage.setItem('ggcCoins', totalCoins);
            if (final > highScore) {
                highScore = final;
                localStorage.setItem('ggcPremiumHS', highScore);
            }
        }
        
        function restart() {
            document.getElementById('over').classList.remove('active');
            reset();
            gameState = 'playing';
        }
        
        function menu() {
            document.getElementById('over').classList.remove('active');
            document.getElementById('start').classList.add('active');
            updateUI();
        }
        
        function share() {
            const text = `I just ran ${Math.floor(score)}m in Super Green Green Chicken! Walked, jumped & screamed GWEEN GWEEN ${combo} times! 🐔🌿 Beat me → greengreenchicken.com`;
            if (navigator.share) navigator.share({title:'Super Green Green Chicken', text, url:'https://greengreenchicken.com'});
            else { navigator.clipboard.writeText(text); alert('✅ Copied for TikTok/IG/WhatsApp!'); }
        }
        
        function watchRewarded() {
            alert("📺 Rewarded ad demo\n+220 bonus coins added!");
            totalCoins += 220;
            localStorage.setItem('ggcCoins', totalCoins);
            updateUI();
        }
        
        function updateUI() {
            document.getElementById('hs').textContent = `Best Run: ${highScore}m`;
            document.getElementById('totalCoins').textContent = totalCoins;
            document.getElementById('shopCoins').textContent = `🪙 ${totalCoins}`;
            document.getElementById('runLv').textContent = upgrades.run;
            document.getElementById('jumpLv').textContent = upgrades.jump;
            document.getElementById('doubleLv').textContent = upgrades.double;
        }
        
        function showShop() {
            document.getElementById('start').classList.remove('active');
            document.getElementById('shop').classList.add('active');
            updateUI();
        }
        
        function hideShop() {
            document.getElementById('shop').classList.remove('active');
            document.getElementById('start').classList.add('active');
            updateUI();
        }
        
        function buyRun() {
            let cost = 85 + upgrades.run * 50;
            if (totalCoins >= cost) {
                totalCoins -= cost; upgrades.run++; saveProgress(); updateUI();
            } else alert("Keep running for more coins! 🐔");
        }
        
        function buyJump() {
            let cost = 105 + upgrades.jump * 55;
            if (totalCoins >= cost) {
                totalCoins -= cost; upgrades.jump++; saveProgress(); updateUI();
            } else alert("Need more green! 🌿");
        }
        
        function buyDouble() {
            let cost = 155 + upgrades.double * 75;
            if (totalCoins >= cost) {
                totalCoins -= cost; upgrades.double++; saveProgress(); updateUI();
            } else alert("Collect more to unlock double jump!");
        }
        
        function saveProgress() {
            localStorage.setItem('ggcPremiumUpg', JSON.stringify(upgrades));
            localStorage.setItem('ggcCoins', totalCoins);
        }
        
        // INPUT - PREMIUM MOBILE + DESKTOP
        function handlePointer(e, down) {
            if (gameState !== 'playing') return;
            const rect = canvas.getBoundingClientRect();
            const tx = e.touches ? e.touches[0].clientX - rect.left : e.clientX - rect.left;
            const ty = e.touches ? e.touches[0].clientY - rect.top : e.clientY - rect.top;
            
            if (down) {
                if (tx < W * 0.35) leftPressed = true;
                else if (tx > W * 0.65) rightPressed = true;
                else {
                    jumpPressed = true;
                    holdStart = Date.now();
                }
            } else {
                leftPressed = false;
                rightPressed = false;
                if (Date.now() - holdStart < 180) jumpPressed = true; // quick tap = jump
            }
        }
        
        canvas.addEventListener('pointerdown', e => handlePointer(e, true));
        canvas.addEventListener('pointerup', e => handlePointer(e, false));
        canvas.addEventListener('pointerleave', () => { leftPressed = rightPressed = false; });
        
        document.addEventListener('keydown', e => {
            if (gameState !== 'playing') return;
            if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') leftPressed = true;
            if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') rightPressed = true;
            if (e.key === ' ' || e.key === 'Spacebar') jumpPressed = true;
        });
        
        document.addEventListener('keyup', e => {
            if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') leftPressed = false;
            if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') rightPressed = false;
            if (e.key === ' ' || e.key === 'Spacebar') jumpPressed = false;
        });
        
        // Init
        updateUI();
        loop();
        
        function resize() {
            let ratio = W / H;
            let cw = Math.min(window.innerWidth * 0.96, 460);
            canvas.style.width = cw + 'px';
            canvas.style.height = (cw / ratio) + 'px';
        }
        window.addEventListener('resize', resize);
        resize();
    </script>
</body>
</html>
